<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐍 Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #e8e8f0;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Animated background */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    overflow: hidden; pointer-events: none;
  }
  .bg .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.2;
    animation: orbFloat 22s ease-in-out infinite;
  }
  .bg .orb:nth-child(1) {
    width: 500px; height: 500px;
    background: #00b894;
    top: -15%; left: -15%;
    animation-delay: 0s;
  }
  .bg .orb:nth-child(2) {
    width: 400px; height: 400px;
    background: #6c5ce7;
    bottom: -15%; right: -15%;
    animation-delay: -8s;
  }
  @keyframes orbFloat {
    0%, 100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(60px,-50px) scale(1.08); }
    66% { transform: translate(-40px,40px) scale(0.92); }
  }

  .container {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 20px;
    width: 100%; max-width: 560px;
  }

  /* Header */
  .header {
    display: flex; align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 480px;
  }
  .logo {
    font-size: 22px; font-weight: 800;
    background: linear-gradient(135deg, #00b894, #6c5ce7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.3px;
  }
  .scores {
    display: flex; gap: 16px; font-size: 14px;
  }
  .scores span {
    display: flex; align-items: center; gap: 5px;
  }
  .scores .num {
    font-weight: 700;
    background: linear-gradient(135deg, #00b894, #55efc4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .scores .num.high {
    background: linear-gradient(135deg, #fdcb6e, #e17055);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Canvas wrapper */
  .canvas-wrap {
    position: relative;
    border-radius: 16px;
    background: #0a0a14;
    border: 1px solid #1e1e38;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    overflow: hidden;
    width: min(100%, 480px);
    aspect-ratio: 1 / 1;
  }
  .canvas-wrap canvas {
    display: block;
    width: 100%; height: 100%;
    image-rendering: pixelated;
  }

  /* Overlay (start / pause / gameover) */
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(4px);
    transition: opacity 0.3s ease;
    z-index: 10;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay .title {
    font-size: 28px; font-weight: 700; margin-bottom: 6px;
  }
  .overlay .title.gameover { color: #ff6b6b; }
  .overlay .sub {
    font-size: 14px; color: #8888aa; margin-bottom: 20px;
  }
  .overlay .final-score {
    font-size: 36px; font-weight: 800;
    margin-bottom: 4px;
  }
  .overlay .final-label { font-size: 13px; color: #8888aa; margin-bottom: 20px; }
  .btn {
    background: linear-gradient(135deg, #00b894, #00a381);
    border: none; color: #fff;
    padding: 12px 36px;
    border-radius: 12px;
    font-size: 16px; font-weight: 700;
    cursor: pointer;
    transition: all 0.25s ease;
    font-family: inherit;
    letter-spacing: 0.5px;
  }
  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,184,148,0.35);
  }
  .btn:active { transform: scale(0.96); }

  /* Status bar */
  .status-bar {
    display: flex; align-items: center;
    justify-content: center; gap: 12px;
    width: 100%; max-width: 480px;
    font-size: 13px; color: #8888aa;
    min-height: 28px;
  }
  .status-bar .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
    transition: background 0.3s;
  }
  .dot.idle { background: #8888aa; }
  .dot.playing { background: #00b894; box-shadow: 0 0 8px #00b894; }
  .dot.paused { background: #fdcb6e; }
  .dot.gameover { background: #ff6b6b; }

  /* D-Pad */
  .dpad {
    display: none;
    grid-template-areas:
      ". up ."
      "left down right";
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    width: 180px;
    margin-top: 4px;
  }
  .dpad-btn {
    width: 56px; height: 56px;
    border-radius: 14px;
    border: 1px solid #1e1e38;
    background: #1a1a2e;
    color: #e8e8f0;
    font-size: 22px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .dpad-btn:active {
    background: #00b894;
    border-color: #00b894;
    transform: scale(0.92);
  }
  .dpad-btn.up    { grid-area: up; }
  .dpad-btn.down  { grid-area: down; }
  .dpad-btn.left  { grid-area: left; }
  .dpad-btn.right { grid-area: right; }

  .shortcuts-hint {
    font-size: 11px; color: #5555;
    text-align: center;
    max-width: 480px;
    width: 100%;
  }
  .shortcuts-hint kbd {
    background: #1a1a2e;
    border: 1px solid #1e1e38;
    border-radius: 4px;
    padding: 2px 7px;
    font-family: inherit;
    font-size: 11px;
    color: #8888aa;
  }

  /* Responsive */
  @media (pointer: coarse) {
    .dpad { display: grid; }
    .shortcuts-hint { display: none; }
  }
  @media (max-width: 500px) {
    .container { padding: 12px; gap: 10px; }
    .logo { font-size: 18px; }
    .scores { font-size: 12px; gap: 10px; }
    .overlay .title { font-size: 22px; }
    .overlay .final-score { font-size: 28px; }
    .btn { padding: 10px 28px; font-size: 14px; }
  }
</style>
</head>
<body>

<div class="bg">
  <div class="orb"></div>
  <div class="orb"></div>
</div>

<div class="container">
  <!-- Header -->
  <div class="header">
    <div class="logo">🐍 Snake</div>
    <div class="scores">
      <span>🏆 <span class="num" id="scoreDisplay">0</span></span>
      <span>👑 <span class="num high" id="highScoreDisplay">0</span></span>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-wrap">
    <canvas id="gameCanvas"></canvas>

    <!-- Start Overlay -->
    <div class="overlay" id="startOverlay">
      <div class="title">🐍 贪吃蛇</div>
      <div class="sub">方向键 / WASD 控制 · 空格暂停</div>
      <button class="btn" id="startBtn">开始游戏</button>
    </div>

    <!-- Game Over Overlay -->
    <div class="overlay hidden" id="gameoverOverlay">
      <div class="title gameover">💀 游戏结束</div>
      <div class="final-score" id="finalScore">0</div>
      <div class="final-label" id="finalLabel">得分</div>
      <button class="btn" id="restartBtn">🔄 再来一局</button>
    </div>

    <!-- Pause Overlay (overlays on top of game) -->
    <div class="overlay hidden" id="pauseOverlay">
      <div class="title">⏸️ 已暂停</div>
      <div class="sub">按 空格键 继续</div>
    </div>
  </div>

  <!-- Status -->
  <div class="status-bar">
    <span class="dot idle" id="statusDot"></span>
    <span id="statusText">按方向键或点击开始</span>
  </div>

  <!-- D-Pad (mobile) -->
  <div class="dpad" id="dpad">
    <button class="dpad-btn up"    data-dir="up">↑</button>
    <button class="dpad-btn left"  data-dir="left">←</button>
    <button class="dpad-btn down"  data-dir="down">↓</button>
    <button class="dpad-btn right" data-dir="right">→</button>
  </div>

  <div class="shortcuts-hint">
    <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 移动 &nbsp;·&nbsp;
    <kbd>Space</kbd> 暂停 &nbsp;·&nbsp; <kbd>R</kbd> 重新开始
  </div>
</div>

<script>
  // ===== Constants =====
  const GRID_SIZE = 20;
  const DIRS = {
    up:    { x:  0, y: -1 },
    down:  { x:  0, y:  1 },
    left:  { x: -1, y:  0 },
    right: { x:  1, y:  0 },
  };
  const OPPOSITE = { up: 'down', down: 'up', left: 'right', right: 'left' };
  const SPEED_TIERS = [
    { max: 4,  speed: 150 },
    { max: 9,  speed: 130 },
    { max: 14, speed: 110 },
    { max: 19, speed: 90  },
    { max: Infinity, speed: 70 },
  ];

  // ===== DOM refs =====
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const highScoreDisplay = document.getElementById('highScoreDisplay');
  const statusText = document.getElementById('statusText');
  const statusDot = document.getElementById('statusDot');
  const startOverlay = document.getElementById('startOverlay');
  const gameoverOverlay = document.getElementById('gameoverOverlay');
  const pauseOverlay = document.getElementById('pauseOverlay');
  const finalScore = document.getElementById('finalScore');
  const finalLabel = document.getElementById('finalLabel');
  const startBtn = document.getElementById('startBtn');
  const restartBtn = document.getElementById('restartBtn');

  // ===== State =====
  let W, H, TILE;
  let snake, direction, nextDirection, food;
  let score, highScore;
  let status; // 'idle' | 'playing' | 'paused' | 'gameover'
  let loopId = null;
  let animTick = 0;

  // Touch state
  let touchStartX = 0, touchStartY = 0;

  // ===== Canvas sizing =====
  function resizeCanvas() {
    const wrap = canvas.parentElement;
    const rect = wrap.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    const displaySize = Math.min(rect.width, rect.height);
    W = H = displaySize;
    canvas.style.width = displaySize + 'px';
    canvas.style.height = displaySize + 'px';
    canvas.width = displaySize * dpr;
    canvas.height = displaySize * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    TILE = W / GRID_SIZE;
    if (status === 'idle' || status === 'gameover') render();
  }

  // ===== Utility =====
  function randomFood() {
    const occupied = new Set(snake.map(p => `${p.x},${p.y}`));
    const free = [];
    for (let x = 0; x < GRID_SIZE; x++)
      for (let y = 0; y < GRID_SIZE; y++)
        if (!occupied.has(`${x},${y}`)) free.push({ x, y });
    if (free.length === 0) return null;
    return free[Math.floor(Math.random() * free.length)];
  }

  function getSpeed() {
    for (const t of SPEED_TIERS)
      if (score <= t.max) return t.speed;
    return 70;
  }

  function loadHighScore() {
    try { return parseInt(localStorage.getItem('snake_highscore')) || 0; }
    catch { return 0; }
  }

  function saveHighScore() {
    if (score > highScore) {
      highScore = score;
      try { localStorage.setItem('snake_highscore', highScore); } catch {}
    }
  }

  // ===== Init / Reset =====
  function resetGame() {
    snake = [{ x: 10, y: 10 }];
    direction = 'right';
    nextDirection = 'right';
    score = 0;
    highScore = loadHighScore();
    food = randomFood();
    animTick = 0;
    updateScoreUI();
    setStatus('idle');
  }

  function startGame() {
    resetGame();
    status = 'playing';
    startOverlay.classList.add('hidden');
    gameoverOverlay.classList.add('hidden');
    pauseOverlay.classList.add('hidden');
    setStatus('playing');
    startLoop();
  }

  function gameOver() {
    status = 'gameover';
    stopLoop();
    saveHighScore();
    finalScore.textContent = score;
    finalLabel.textContent = score > highScore ? '🎉 新纪录！' : '得分';
    gameoverOverlay.classList.remove('hidden');
    setStatus('gameover');
    render();
  }

  // ===== Loop =====
  function startLoop() {
    stopLoop();
    loopId = setInterval(tick, getSpeed());
  }

  function stopLoop() {
    if (loopId) { clearInterval(loopId); loopId = null; }
  }

  function restartLoop() {
    if (status === 'playing') {
      stopLoop();
      loopId = setInterval(tick, getSpeed());
    }
  }

  // ===== Tick =====
  function tick() {
    if (status !== 'playing') return;
    animTick++;

    // Apply buffered direction
    if (nextDirection && OPPOSITE[nextDirection] !== direction) {
      direction = nextDirection;
    }

    const move = DIRS[direction];
    const head = snake[0];
    const newHead = { x: head.x + move.x, y: head.y + move.y };

    // Wall collision
    if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
      gameOver();
      return;
    }

    // Self collision
    for (const seg of snake) {
      if (seg.x === newHead.x && seg.y === newHead.y) {
        gameOver();
        return;
      }
    }

    // Move
    snake.unshift(newHead);

    // Eat food?
    if (food && newHead.x === food.x && newHead.y === food.y) {
      score++;
      food = randomFood();
      updateScoreUI();
      saveHighScore();
      restartLoop(); // speed might have changed
    } else {
      snake.pop();
    }

    render();
  }

  // ===== Render =====
  function render() {
    ctx.clearRect(0, 0, W, H);

    // --- Background ---
    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(0, 0, W, H);

    // --- Grid ---
    ctx.strokeStyle = 'rgba(255,255,255,0.035)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= GRID_SIZE; i++) {
      const pos = i * TILE;
      ctx.beginPath();
      ctx.moveTo(pos, 0); ctx.lineTo(pos, H); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, pos); ctx.lineTo(W, pos); ctx.stroke();
    }

    // --- Food ---
    if (food) {
      const fx = food.x * TILE + TILE / 2;
      const fy = food.y * TILE + TILE / 2;
      const pulse = 1 + 0.12 * Math.sin(animTick * 0.12);
      const r = (TILE * 0.38) * pulse;

      // Glow
      const glow = ctx.createRadialGradient(fx, fy, 0, fx, fy, r * 2.5);
      glow.addColorStop(0, 'rgba(255,107,107,0.3)');
      glow.addColorStop(1, 'rgba(255,107,107,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(fx, fy, r * 2.5, 0, Math.PI * 2);
      ctx.fill();

      // Body
      const grad = ctx.createRadialGradient(fx - r*0.3, fy - r*0.3, 0, fx, fy, r);
      grad.addColorStop(0, '#ff8a8a');
      grad.addColorStop(1, '#ff6b6b');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(fx, fy, r, 0, Math.PI * 2);
      ctx.fill();

      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(fx - r*0.25, fy - r*0.25, r * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    // --- Snake ---
    const len = snake.length;
    for (let i = len - 1; i >= 0; i--) {
      const seg = snake[i];
      const sx = seg.x * TILE;
      const sy = seg.y * TILE;
      const pad = i === 0 ? 1 : 2;
      const size = TILE - pad * 2;

      // Color: head → tail gradient
      const t = len > 1 ? i / (len - 1) : 0;
      const r = Math.round(0 + t * 85);
      const g = Math.round(184 - t * 80);
      const b = Math.round(148 + t * 48);
      ctx.fillStyle = `rgb(${r},${g},${b})`;

      // Rounded rect
      const radius = Math.min(size * 0.35, 5);
      const x = sx + pad, y = sy + pad;
      const w = size, h = size;
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.lineTo(x + w - radius, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
      ctx.lineTo(x + w, y + h - radius);
      ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
      ctx.lineTo(x + radius, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
      ctx.lineTo(x, y + radius);
      ctx.quadraticCurveTo(x, y, x + radius, y);
      ctx.closePath();
      ctx.fill();

      // Head shine
      if (i === 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.15)';
        ctx.beginPath();
        ctx.ellipse(sx + TILE*0.3, sy + TILE*0.25, TILE*0.2, TILE*0.12, -0.4, 0, Math.PI*2);
        ctx.fill();

        // Eyes
        const eyeR = TILE * 0.08;
        let ex1, ey1, ex2, ey2;
        const cx = sx + TILE / 2, cy = sy + TILE / 2;
        switch (direction) {
          case 'up':
            ex1 = cx - TILE*0.2; ey1 = cy - TILE*0.2;
            ex2 = cx + TILE*0.2; ey2 = cy - TILE*0.2;
            break;
          case 'down':
            ex1 = cx - TILE*0.2; ey1 = cy + TILE*0.2;
            ex2 = cx + TILE*0.2; ey2 = cy + TILE*0.2;
            break;
          case 'left':
            ex1 = cx - TILE*0.2; ey1 = cy - TILE*0.2;
            ex2 = cx - TILE*0.2; ey2 = cy + TILE*0.2;
            break;
          case 'right':
            ex1 = cx + TILE*0.2; ey1 = cy - TILE*0.2;
            ex2 = cx + TILE*0.2; ey2 = cy + TILE*0.2;
            break;
        }
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(ex1, ey1, eyeR, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2, ey2, eyeR, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#111';
        ctx.beginPath(); ctx.arc(ex1, ey1, eyeR*0.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ex2, ey2, eyeR*0.5, 0, Math.PI*2); ctx.fill();
      }
    }

    // --- Status overlay rendering (when paused) ---
    if (status === 'paused') {
      pauseOverlay.classList.remove('hidden');
    } else {
      pauseOverlay.classList.add('hidden');
    }
  }

  // ===== UI Updates =====
  function updateScoreUI() {
    scoreDisplay.textContent = score;
    highScoreDisplay.textContent = Math.max(score, highScore);
  }

  function setStatus(s) {
    status = s;
    statusDot.className = 'dot ' + s;
    const msgs = {
      idle: '按方向键或点击开始',
      playing: '游戏中...',
      paused: '已暂停',
      gameover: '游戏结束',
    };
    statusText.textContent = msgs[s] || '';
  }

  // ===== Direction Control =====
  function setDirection(dir) {
    if (OPPOSITE[dir] === direction) return; // no reverse
    nextDirection = dir;
    if (status === 'idle') {
      startGame();
      return;
    }
  }

  // ===== Keyboard =====
  document.addEventListener('keydown', e => {
    const key = e.key;
    const map = {
      ArrowUp: 'up', ArrowDown: 'down', ArrowLeft: 'left', ArrowRight: 'right',
      w: 'up', W: 'up', s: 'down', S: 'down', a: 'left', A: 'left', d: 'right', D: 'right',
    };

    if (map[key]) {
      e.preventDefault();
      setDirection(map[key]);
      return;
    }

    if (key === ' ' || key === 'Spacebar') {
      e.preventDefault();
      togglePause();
      return;
    }

    if (key === 'r' || key === 'R') {
      if (status === 'gameover' || status === 'playing' || status === 'paused') {
        startGame();
      }
    }
  });

  // ===== Pause / Resume =====
  function togglePause() {
    if (status === 'playing') {
      status = 'paused';
      stopLoop();
      setStatus('paused');
      render();
    } else if (status === 'paused') {
      status = 'playing';
      setStatus('playing');
      startLoop();
      render();
    }
  }

  // ===== Touch / Swipe =====
  canvas.addEventListener('touchstart', e => {
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, { passive: true });

  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    const threshold = 30;
    if (Math.abs(dx) > threshold || Math.abs(dy) > threshold) {
      if (Math.abs(dx) > Math.abs(dy)) {
        setDirection(dx > 0 ? 'right' : 'left');
      } else {
        setDirection(dy > 0 ? 'down' : 'up');
      }
      touchStartX = t.clientX;
      touchStartY = t.clientY;
    }
  }, { passive: false });

  // ===== D-Pad =====
  document.getElementById('dpad').addEventListener('click', e => {
    const btn = e.target.closest('[data-dir]');
    if (btn) {
      e.preventDefault();
      setDirection(btn.dataset.dir);
    }
  });

  // ===== Buttons =====
  startBtn.addEventListener('click', startGame);
  restartBtn.addEventListener('click', startGame);

  // ===== Window events =====
  window.addEventListener('resize', resizeCanvas);
  window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 200));

  // ===== Init =====
  resetGame();
  resizeCanvas();
  render();
</script>
</body>
</html>
